<div class="layout-shell"
     [class.drag-active]="isDraggingOver()"
     (dragover)="onDragOver($event)"
     (dragleave)="onDragLeave()"
     (drop)="onDrop($event)">

  <header class="app-header">
    <div class="header-brand">
      <span class="brand-mark">
        <img src="favicon.svg" alt="Expunge" width="20" height="20" />
      </span>
      <span class="brand-text">Expunge</span>
    </div>
    
    @if (pdfLoaded | async) {
      <div class="header-file-pill">
        <mat-icon class="mat-icon-sm">picture_as_pdf</mat-icon>
        <span class="file-name">{{ filename | async }}</span>
      </div>
    }

    <div class="header-actions">
      <button class="header-btn" matTooltip="Upload PDF" (click)="triggerUpload()">
        <mat-icon>upload_file</mat-icon>
      </button>
      @if (pdfLoaded | async) {
        <button class="header-btn header-btn--danger"
                matTooltip="Revert to original PDF"
                (click)="pdfService.revertToOriginal()">
          <mat-icon>history</mat-icon>
        </button>
      }
      <button class="header-btn theme-btn" (click)="themeService.toggle()">
        <mat-icon>{{ (isDark | async) ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </div>
  </header>

  <main class="layout-main">

    <section class="panel panel-doc"
             [class.panel-hidden-mobile]="activeTab() !== 'document'">
      <ng-content select="[layoutSlot='doc']"></ng-content>
    </section>

    <div class="resize-handle" (mousedown)="startResize($event)">
      <span class="resize-dots"><span></span><span></span><span></span></span>
    </div>

    <aside class="panel panel-tools"
           [class.panel-hidden-mobile]="activeTab() !== 'tools'">

      <nav class="tool-rail">
        @for (tool of tools(); track tool.id) {
          <button class="rail-btn"
                  [class.rail-btn--active]="activeTool() === tool.id"
                  [matTooltip]="tool.label"
                  matTooltipPosition="left"
                  (click)="toolChange.emit(tool.id)">
            <mat-icon>{{ tool.icon }}</mat-icon>
          </button>
          @if (tool.dividerAfter) {
            <hr class="rail-divider" />
          }
        }
      </nav>

      <div class="feature-panel">
        <header class="feature-panel__header">
          <span>{{ activeToolEntry()?.label }}</span>
        </header>
        <div class="feature-panel__body">
          <ng-container [ngComponentOutlet]="activeToolComponent()" />
        </div>
      </div>

    </aside>

  </main>

  <nav class="mobile-tabs">
    <button class="mobile-tab"
            [class.active]="activeTab() === 'document'"
            (click)="setTab('document')">
      <mat-icon>picture_as_pdf</mat-icon>
      <span>Document</span>
    </button>
    <button class="mobile-tab"
            [class.active]="activeTab() === 'tools'"
            (click)="setTab('tools')">
      <mat-icon>build</mat-icon>
      <span>Tools</span>
    </button>
  </nav>

</div>

@if (isDraggingOver()) {
  <div class="drop-overlay">
    <div class="drop-card">
      <mat-icon class="mat-icon-lg">upload_file</mat-icon>
      <p>Drop your PDF here</p>
    </div>
  </div>
}

<input #fileInput type="file" accept=".pdf" style="display:none" (change)="onFileChange($event)">
