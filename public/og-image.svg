<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080a10"/>

  <!-- Logo mark (scaled up from 32px to 120px, centered at 600,220) -->
  <g transform="translate(540, 160) scale(3.75)">
    <rect width="32" height="32" rx="7" fill="#0e1118" stroke="#1c2030" stroke-width="0.5"/>
    <rect x="8" y="8" width="16" height="3" rx="1.5" fill="#2a2f45"/>
    <rect x="8" y="14" width="13" height="3" rx="1.5" fill="#2a2f45"/>
    <rect x="5" y="19" width="22" height="6" rx="2" fill="#7c6cf4"/>
    <rect x="8" y="27" width="16" height="3" rx="1.5" fill="#2a2f45"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="410"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="72"
        font-weight="700"
        fill="#eef0f8"
        text-anchor="middle"
        letter-spacing="-2">Expunge</text>

  <!-- Tagline -->
  <text x="600" y="468"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="24"
        font-weight="400"
        fill="#8b90a8"
        text-anchor="middle"
        letter-spacing="0.5">True, permanent PDF redaction — entirely on your device.</text>

  <!-- Bottom accent line -->
  <rect x="520" y="510" width="160" height="2" rx="1" fill="#7c6cf4" opacity="0.5"/>
</svg>